<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>DaySpent</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow-x:hidden;background:#0F0F13}
    #root{width:100%;min-height:100vh}
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    input{outline:none;border:none;background:none;color:inherit;font-family:inherit}
    .tap{transition:transform .12s,opacity .12s;cursor:pointer}.tap:active{transform:scale(.95);opacity:.85}
    .pEnter{animation:pUp .3s cubic-bezier(.22,1,.36,1)}
    @keyframes pUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .tAnim{animation:tIn .3s cubic-bezier(.22,1,.36,1)}
    @keyframes tIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
    .mEnter{animation:mIn .25s cubic-bezier(.22,1,.36,1)}
    @keyframes mIn{from{opacity:0;transform:translateY(40px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .bAnim{animation:bG .6s cubic-bezier(.22,1,.36,1) forwards;transform-origin:bottom}
    @keyframes bG{from{transform:scaleY(0)}to{transform:scaleY(1)}}
    .nav{transition:all .2s;cursor:pointer}
    .eRow{transition:background .15s}.eRow:hover{background:rgba(255,255,255,.04)}
    .chip{transition:all .15s;cursor:pointer}
    .tog{position:relative;width:46px;height:26px}
    .tog input{opacity:0;width:0;height:0}
    .slid{position:absolute;inset:0;border-radius:26px;background:rgba(255,255,255,.1);transition:.3s;cursor:pointer}
    .slid:before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
    input:checked+.slid{background:linear-gradient(135deg,#FF6B6B,#FF8E53)}
    input:checked+.slid:before{transform:translateX(20px)}
    .sr{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.05)}
    .sr:last-child{border-bottom:none}
    .aSlide{animation:aSlide .35s cubic-bezier(.22,1,.36,1)}
    @keyframes aSlide{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
    .aSlideBack{animation:aSlideBack .35s cubic-bezier(.22,1,.36,1)}
    @keyframes aSlideBack{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // Полностью локальная версия без Firebase зависимостей
    (function() {
      const CATEGORIES = [
        { id:"food", label:"Еда", icon:"🍽️", color:"#FF6B6B" },
        { id:"transport", label:"Транспорт", icon:"🚇", color:"#4ECDC4" },
        { id:"shopping", label:"Покупки", icon:"🛍️", color:"#FFE66D" },
        { id:"health", label:"Здоровье", icon:"💊", color:"#A8E6CF" },
        { id:"entertainment", label:"Развлечения", icon:"🎬", color:"#C3A6FF" },
        { id:"utilities", label:"Коммунальные", icon:"💡", color:"#FFB347" },
        { id:"other", label:"Другое", icon:"📦", color:"#B0B0B0" },
      ];
      const DAYS_RU = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
      const DAYS_EN = ["Mo","Tu","We","Th","Fr","Sa","Su"];
      const CURRENCIES = [
        { id:"RUB", symbol:"₽", label:"Российский рубль", flag:"🇷🇺", locale:"ru-RU" },
        { id:"USD", symbol:"$", label:"Доллар США", flag:"🇺🇸", locale:"en-US" },
        { id:"EUR", symbol:"€", label:"Евро", flag:"🇪🇺", locale:"de-DE" },
        { id:"GBP", symbol:"£", label:"Фунт стерлингов", flag:"🇬🇧", locale:"en-GB" },
        { id:"KZT", symbol:"₸", label:"Казахстанский тенге", flag:"🇰🇿", locale:"kk-KZ" },
        { id:"UZS", symbol:"сум", label:"Узбекский сум", flag:"🇺🇿", locale:"uz-UZ" },
        { id:"CNY", symbol:"¥", label:"Китайский юань", flag:"🇨🇳", locale:"zh-CN" },
        { id:"TRY", symbol:"₺", label:"Турецкая лира", flag:"🇹🇷", locale:"tr-TR" },
      ];
      const RATES = { RUB:1, USD:0.011, EUR:0.010, GBP:0.0086, KZT:5.1, UZS:140, CNY:0.079, TRY:0.36 };
      const THEMES = [
        { id:"dark", label:"Тёмная", labelEn:"Dark", bg:"#0F0F13", card:"#1A1A24" },
        { id:"midnight", label:"Полночь", labelEn:"Midnight", bg:"#080B14", card:"#0F1520" },
        { id:"charcoal", label:"Антрацит", labelEn:"Charcoal", bg:"#111111", card:"#1C1C1C" },
      ];
      const GOAL_COLORS = ["#FF6B6B","#4ECDC4","#C3A6FF","#FFE66D","#A8E6CF","#FFB347","#FF8E53","#74B9FF"];
      const GOAL_ICONS = ["🎯","🏖️","🚗","📱","🏠","✈️","💍","🎓","💻","🎸","🏋️","🛳️","🎁","💎"];
      const AV_COLORS = ["#FF6B6B","#4ECDC4","#C3A6FF","#FFB347","#A8E6CF","#FF8E53","#74B9FF","#FFE66D"];

      function todayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      }
      function fmtMoney(n, cid) {
        const cur = CURRENCIES.find(c=>c.id===cid) || CURRENCIES[0];
        return new Intl.NumberFormat(cur.locale,{maximumFractionDigits:0}).format(n*(RATES[cid]||1))+" "+cur.symbol;
      }
      function getInitials(name="") {
        return name.split(" ").map(w=>w[0]||"").join("").toUpperCase().slice(0,2)||"?";
      }
      function getAvatarColor(name="") {
        let h=0; for(const c of name) h=(h+c.charCodeAt(0))%AV_COLORS.length;
        return AV_COLORS[h];
      }
      function lsGet(key) {
        try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; }
      }
      function lsSet(key, val) {
        try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
      }

      // Простые функции для работы с пользователями (локально)
      function getUser(email) {
        const users = lsGet("dayspent_users") || {};
        const key = email.toLowerCase().trim();
        return users[key] || null;
      }

      function createUser(email, password, name) {
        const users = lsGet("dayspent_users") || {};
        const key = email.toLowerCase().trim();
        if (users[key]) return null;
        
        const userData = {
          email: key,
          password: password,
          name: name.trim(),
          expenses: [],
          goals: [],
          settings: {
            lang: "ru",
            currency: "RUB",
            theme: "dark",
            dailyBudget: "",
            notifications: true
          },
          createdAt: new Date().toISOString()
        };
        users[key] = userData;
        lsSet("dayspent_users", users);
        return userData;
      }

      function saveUser(email, data) {
        const users = lsGet("dayspent_users") || {};
        const key = email.toLowerCase().trim();
        if (users[key]) {
          users[key] = { ...users[key], ...data };
          lsSet("dayspent_users", users);
        }
      }

      // React
      const { useState, useRef, useEffect } = React;

      // Auth Screen Component
      function AuthScreen({ onLogin }) {
        const [screen, setScreen] = useState("login");
        const [email, setEmail] = useState("");
        const [pass, setPass] = useState("");
        const [confirm, setConfirm] = useState("");
        const [name, setName] = useState("");
        const [err, setErr] = useState("");
        const [showP, setShowP] = useState(false);
        const [showC, setShowC] = useState(false);
        const [loading, setLoading] = useState(false);
        const [slideDir, setSlideDir] = useState(1);

        const goTo = (s) => {
          setSlideDir(s==="register" ? 1 : -1);
          setErr(""); setEmail(""); setPass(""); setConfirm(""); setName("");
          setScreen(s);
        };

        const doLogin = () => {
          setErr("");
          if (!email.trim()) { setErr("Введите email"); return; }
          if (!pass.trim()) { setErr("Введите пароль"); return; }
          setLoading(true);
          
          setTimeout(() => {
            const acc = getUser(email);
            if (!acc) { 
              setErr("Аккаунт не найден. Сначала зарегистрируйтесь"); 
              setLoading(false);
              return; 
            }
            if (acc.password !== pass) { 
              setErr("Неверный пароль"); 
              setLoading(false);
              return; 
            }
            lsSet("dayspent_session", acc.email);
            onLogin(acc.email, acc);
            setLoading(false);
          }, 300);
        };

        const doRegister = () => {
          setErr("");
          if (!name.trim()) { setErr("Введите имя"); return; }
          if (!email.trim()) { setErr("Введите email"); return; }
          if (pass.length < 6) { setErr("Пароль — минимум 6 символов"); return; }
          if (pass !== confirm) { setErr("Пароли не совпадают"); return; }
          
          setLoading(true);
          
          setTimeout(() => {
            const existing = getUser(email);
            if (existing) { 
              setErr("Email уже зарегистрирован"); 
              setLoading(false);
              return; 
            }
            
            const acc = createUser(email, pass, name);
            if (!acc) {
              setErr("Ошибка при регистрации"); 
              setLoading(false);
              return;
            }
            
            lsSet("dayspent_session", acc.email);
            onLogin(acc.email, acc);
            setLoading(false);
          }, 300);
        };

        const av = getAvatarColor(name||email);
        const animClass = slideDir===1 ? "aSlide" : "aSlideBack";

        const Spin = () => <div style={{width:18,height:18,border:"3px solid rgba(255,255,255,.25)",
          borderTopColor:"#fff",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>;

        return React.createElement("div", {
          style: {minHeight:"100vh",width:"100vw",background:"#08080F",display:"flex",
            alignItems:"center",justifyContent:"center",fontFamily:"'Outfit','Segoe UI',sans-serif",
            padding:"24px 20px",boxSizing:"border-box",overflowX:"hidden"}
        },
          React.createElement("div", { className: animClass, key: screen, style: {width:"100%",maxWidth:380,background:"#13131A",
            borderRadius:24,padding:"28px 24px",border:"1px solid rgba(255,255,255,.07)",
            boxShadow:"0 24px 64px rgba(0,0,0,.6)"} },
            
            React.createElement("div", { style: {display:"flex",alignItems:"center",gap:10,marginBottom:28} },
              React.createElement("div", { style: {width:36,height:36,borderRadius:10,
                background:"linear-gradient(135deg,#FF6B6B,#FF8E53)",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,
                boxShadow:"0 6px 18px rgba(255,107,107,.35)"} }, "💸"),
              React.createElement("span", { style: {fontSize:18,fontWeight:800,color:"#F0EEE8",letterSpacing:-.3} }, "DaySpent")
            ),

            screen === "login" ? React.createElement(React.Fragment, null,
              React.createElement("div", { style: {fontSize:22,fontWeight:800,color:"#F0EEE8",marginBottom:4} }, "С возвращением"),
              React.createElement("div", { style: {fontSize:14,color:"#555",marginBottom:22} }, "Войдите в свой аккаунт"),
              err && React.createElement("div", { style: {background:"rgba(255,107,107,.1)",border:"1px solid rgba(255,107,107,.25)",
                borderRadius:11,padding:"9px 13px",marginBottom:12,fontSize:13,color:"#FF9090",
                display:"flex",alignItems:"center",gap:7} }, "⚠️ ", err),
              React.createElement("div", { style: {background:"rgba(255,255,255,.05)",borderRadius:14,padding:"12px 14px",marginBottom:10,border:"1.5px solid rgba(255,255,255,.07)"} },
                React.createElement("div", { style: {fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:3} }, "EMAIL"),
                React.createElement("input", { value: email, onChange: e => setEmail(e.target.value), type: "email", placeholder: "you@example.com",
                  style: {width:"100%",fontSize:15,color:"#F0EEE8",outline:"none",border:"none",background:"none",fontFamily:"inherit"} })
              ),
              React.createElement("div", { style: {background:"rgba(255,255,255,.05)",borderRadius:14,padding:"12px 14px",marginBottom:10,border:"1.5px solid rgba(255,255,255,.07)"} },
                React.createElement("div", { style: {fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:3} }, "ПАРОЛЬ"),
                React.createElement("div", { style: {display:"flex",alignItems:"center"} },
                  React.createElement("input", { value: pass, onChange: e => setPass(e.target.value), type: showP ? "text" : "password", placeholder: "••••••",
                    style: {flex:1,fontSize:15,color:"#F0EEE8",outline:"none",border:"none",background:"none",fontFamily:"inherit"} }),
                  React.createElement("span", { onClick: () => setShowP(v => !v), style: {cursor:"pointer",fontSize:16,opacity:.4,userSelect:"none",paddingLeft:8} }, showP ? "🙈" : "👁️")
                )
              ),
              React.createElement("div", { style: {marginBottom:18} }),
              React.createElement("button", { className: "tap", onClick: doLogin, disabled: loading, style: {width:"100%",padding:"15px",
                border:"none",borderRadius:15,cursor:"pointer",background:"linear-gradient(135deg,#FF6B6B,#FF8E53)",
                color:"#fff",fontSize:15,fontWeight:800,fontFamily:"inherit",
                boxShadow:"0 8px 24px rgba(255,107,107,.3)",
                display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity: loading ? 0.75 : 1,
                pointerEvents: loading ? "none" : "auto"} },
                loading ? React.createElement(Spin, null) : "Войти →"
              ),
              React.createElement("div", { style: {textAlign:"center",fontSize:14,color:"#444",marginTop:20} },
                "Нет аккаунта? ",
                React.createElement("span", { className: "tap", style: {color:"#FF6B6B",fontWeight:700,cursor:"pointer"}, onClick: () => goTo("register") }, "Зарегистрироваться")
              )
            ) : React.createElement(React.Fragment, null,
              React.createElement("div", { style: {fontSize:22,fontWeight:800,color:"#F0EEE8",marginBottom:4} }, "Создать аккаунт"),
              React.createElement("div", { style: {fontSize:14,color:"#555",marginBottom:22} }, "Заполните данные ниже"),
              (name||email) && React.createElement("div", { style: {width:50,height:50,borderRadius:15,background:av,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:18,fontWeight:800,color:"#fff",margin:"0 auto 16px",
                boxShadow: `0 6px 18px ${av}44`} }, getInitials(name||email)),
              err && React.createElement("div", { style: {background:"rgba(255,107,107,.1)",border:"1px solid rgba(255,107,107,.25)",
                borderRadius:11,padding:"9px 13px",marginBottom:12,fontSize:13,color:"#FF9090",
                display:"flex",alignItems:"center",gap:7} }, "⚠️ ", err),
              React.createElement("div", { style: {background:"rgba(255,255,255,.05)",borderRadius:14,padding:"12px 14px",marginBottom:10,border:"1.5px solid rgba(255,255,255,.07)"} },
                React.createElement("div", { style: {fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:3} }, "ИМЯ"),
                React.createElement("input", { value: name, onChange: e => setName(e.target.value), type: "text", placeholder: "Иван Иванов",
                  style: {width:"100%",fontSize:15,color:"#F0EEE8",outline:"none",border:"none",background:"none",fontFamily:"inherit"} })
              ),
              React.createElement("div", { style: {background:"rgba(255,255,255,.05)",borderRadius:14,padding:"12px 14px",marginBottom:10,border:"1.5px solid rgba(255,255,255,.07)"} },
                React.createElement("div", { style: {fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:3} }, "EMAIL"),
                React.createElement("input", { value: email, onChange: e => setEmail(e.target.value), type: "email", placeholder: "you@example.com",
                  style: {width:"100%",fontSize:15,color:"#F0EEE8",outline:"none",border:"none",background:"none",fontFamily:"inherit"} })
              ),
              React.createElement("div", { style: {background:"rgba(255,255,255,.05)",borderRadius:14,padding:"12px 14px",marginBottom:10,border:"1.5px solid rgba(255,255,255,.07)"} },
                React.createElement("div", { style: {fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:3} }, "ПАРОЛЬ"),
                React.createElement("div", { style: {display:"flex",alignItems:"center"} },
                  React.createElement("input", { value: pass, onChange: e => setPass(e.target.value), type: showP ? "text" : "password", placeholder: "Минимум 6 символов",
                    style: {flex:1,fontSize:15,color:"#F0EEE8",outline:"none",border:"none",background:"none",fontFamily:"inherit"} }),
                  React.createElement("span", { onClick: () => setShowP(v => !v), style: {cursor:"pointer",fontSize:16,opacity:.4,userSelect:"none",paddingLeft:8} }, showP ? "🙈" : "👁️")
                )
              ),
              React.createElement("div", { style: {background:"rgba(255,255,255,.05)",borderRadius:14,padding:"12px 14px",marginBottom:10,border:"1.5px solid rgba(255,255,255,.07)"} },
                React.createElement("div", { style: {fontSize:10,color:"#555",fontWeight:700,letterSpacing:1,marginBottom:3} }, "ПОДТВЕРДИТЕ ПАРОЛЬ"),
                React.createElement("div", { style: {display:"flex",alignItems:"center"} },
                  React.createElement("input", { value: confirm, onChange: e => setConfirm(e.target.value), type: showC ? "text" : "password", placeholder: "••••••",
                    style: {flex:1,fontSize:15,color:"#F0EEE8",outline:"none",border:"none",background:"none",fontFamily:"inherit"} }),
                  React.createElement("span", { onClick: () => setShowC(v => !v), style: {cursor:"pointer",fontSize:16,opacity:.4,userSelect:"none",paddingLeft:8} }, showC ? "🙈" : "👁️")
                )
              ),
              React.createElement("div", { style: {marginBottom:18} }),
              React.createElement("button", { className: "tap", onClick: doRegister, disabled: loading, style: {width:"100%",padding:"15px",
                border:"none",borderRadius:15,cursor:"pointer",background:"linear-gradient(135deg,#FF6B6B,#FF8E53)",
                color:"#fff",fontSize:15,fontWeight:800,fontFamily:"inherit",
                boxShadow:"0 8px 24px rgba(255,107,107,.3)",
                display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity: loading ? 0.75 : 1,
                pointerEvents: loading ? "none" : "auto"} },
                loading ? React.createElement(Spin, null) : "Создать аккаунт →"
              ),
              React.createElement("div", { style: {textAlign:"center",fontSize:14,color:"#444",marginTop:20} },
                "Уже есть аккаунт? ",
                React.createElement("span", { className: "tap", style: {color:"#FF6B6B",fontWeight:700,cursor:"pointer"}, onClick: () => goTo("login") }, "Войти")
              )
            )
          )
        );
      }

      // Main App Component - упрощенная версия
      function MainApp({ userKey, userData, setUserData, onLogout }) {
        const [page, setPage] = useState("dashboard");
        const [toast, setToast] = useState(null);
        const [showModal, setShowModal] = useState(false);
        const [form, setForm] = useState({amount:"",category:"food",note:"",date:todayStr()});
        const [filterCat, setFilterCat] = useState("all");
        const [editId, setEditId] = useState(null);
        const nextId = useRef(500);

        const [lang, setLang] = useState(userData.settings?.lang||"ru");
        const [currency, setCurrency] = useState(userData.settings?.currency||"RUB");
        const [theme, setTheme] = useState(userData.settings?.theme||"dark");
        const [dailyBudget, setDailyBudget] = useState(userData.settings?.dailyBudget||"");
        const [notifications, setNotifs] = useState(userData.settings?.notifications!==false);
        const [showClear, setShowClear] = useState(false);

        const [expenses, setExpenses] = useState(userData.expenses||[]);
        const [goals, setGoals] = useState(userData.goals||[]);

        const [showGoalModal, setShowGoalModal] = useState(false);
        const [goalForm, setGoalForm] = useState({name:"",target:"",saved:"",color:"#4ECDC4",icon:"🎯"});
        const [editGoalId, setEditGoalId] = useState(null);
        const [showDeposit, setShowDeposit] = useState(null);
        const [depositForm, setDepositForm] = useState({amount:"",isWithdraw:false});
        const nextGid = useRef(700);

        const [showProfile, setShowProfile] = useState(false);
        const [profForm, setProfForm] = useState({name:userData.name||""});
        const [showLogout, setShowLogout] = useState(false);

        // Сохранение данных
        useEffect(() => {
          const updated = {expenses, goals, settings: {lang, currency, theme, dailyBudget, notifications}};
          setUserData(p => ({...p, ...updated}));
          if (userKey) {
            lsSet("dayspent_userdata", {...(lsGet("dayspent_userdata")||{}), ...updated});
            saveUser(userKey, updated);
          }
        }, [expenses, goals, lang, currency, theme, dailyBudget, notifications]);

        const T = {
          ru: {
            dashboard:"Обзор", expenses:"Расходы", analytics:"Аналитика", settings:"Настройки", piggy:"Копилка",
            today:"Сегодня", total:"Всего", week:"Неделя", byCat:"По категориям", recent:"Последние", allA:"Все →",
            dist:"Распределение", details:"Детали по категориям", byDays:"По дням недели",
            newE:"Новый расход", editE:"Редактировать", saveC:"Сохранить изменения", addE:"Добавить расход",
            amL:"СУММА", catL:"КАТЕГОРИЯ", noteL:"ЗАМЕТКА", dateL:"ДАТА", notePh:"Описание расхода...",
            ops:"операций", noData:"Нет данных", noExp:"Нет расходов",
            updated:"Расход обновлён", added:"Расход добавлен", deleted:"Удалено",
            lang:"Язык", cur:"Валюта", themeL:"Тема", budget:"Дневной бюджет", budgetH:"Лимит расходов в день",
            notifL:"Уведомления", notifH:"Напоминания о расходах", dataL:"Данные", clearD:"Очистить все данные",
            clearQ:"Вы уверены? Все расходы будут удалены.", yes:"Да, удалить", cancel:"Отмена",
            ver:"Версия 2.0.0", made:"Сделано с ❤️",

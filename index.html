async function fbGetUser(email) {
  try {
    const key = email.toLowerCase().trim();
    const snap = await USERS.doc(key).get();
    return snap.exists ? snap.data() : null;
  } catch(err) { 
    console.error("fbGetUser error:", err);
    return null; 
  }
}

async function fbCreateUser(email, password, name) {
  try {
    const key = email.toLowerCase().trim();
    const userData = {
      email: key,
      password,
      name: name.trim(),
      expenses: [],
      goals: [],
      settings: {
        lang: "ru",
        currency: "RUB",
        theme: "dark",
        dailyBudget: "",
        notifications: true
      },
      createdAt: new Date().toISOString()
    };
    // Используем set с merge, чтобы избежать проблем с правами
    await USERS.doc(key).set(userData, { merge: true });
    return userData;
  } catch(err) {
    console.error("fbCreateUser error:", err);
    throw err;
  }
}

async function fbSaveUser(email, data) {
  try {
    const key = email.toLowerCase().trim();
    // Используем update или set с merge
    await USERS.doc(key).update(data);
  } catch(err) {
    console.error("fbSaveUser error:", err);
    // Если update не работает, пробуем set с merge
    try {
      const current = await USERS.doc(key).get();
      if (current.exists) {
        await USERS.doc(key).set(data, { merge: true });
      }
    } catch(e2) {
      console.error("Fallback save also failed:", e2);
    }
  }
}

function App() {
  const [userKey,  setUserKey]  = useState(()=>lsGet("dayspent_session")||null);
  const [userData, setUserData] = useState(()=>lsGet("dayspent_userdata")||null);
  const [loading, setLoading] = useState(!!userKey);

  // При старте — если есть сессия, подгрузить свежие данные с Firebase
  useEffect(()=>{
    const sk = lsGet("dayspent_session");
    if (!sk) {
      setLoading(false);
      return;
    }
    fbGetUser(sk).then(acc=>{
      if (acc) { 
        setUserData(acc); 
        lsSet("dayspent_userdata", acc); 
      } else { 
        lsSet("dayspent_session",null); 
        lsSet("dayspent_userdata",null); 
        setUserKey(null); 
        setUserData(null); 
      }
      setLoading(false);
    }).catch(e=>{
      console.error("Failed to load user:", e);
      setLoading(false);
    });
  },[]);

  const handleLogin  = (key, acc) => {
    setUserKey(key); 
    setUserData(acc);
    lsSet("dayspent_session", key);
    lsSet("dayspent_userdata", acc);
  };
  
  const handleLogout = () => {
    lsSet("dayspent_session", null);
    lsSet("dayspent_userdata", null);
    setUserKey(null); 
    setUserData(null);
  };

  if (loading) {
    return (
      <div style={{width:"100vw",minHeight:"100vh",background:"#0F0F13",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontSize:32}}>⏳</div>
      </div>
    );
  }

  return (
    <div style={{width:"100vw",minHeight:"100vh",overflowX:"hidden"}}>
      {!userKey
        ? <AuthScreen onLogin={handleLogin}/>
        : <MainApp key={userKey} userKey={userKey} userData={userData} setUserData={setUserData} onLogout={handleLogout}/>
      }
    </div>
  );
}

  const [editGoalId,       setEditGoalId]       = useState(null);
  const [showDeposit,      setShowDeposit]      = useState(null);
  const [depositForm,      setDepositForm]      = useState({amount:"",isWithdraw:false});
  const nextGid = useRef(700);

  const [showProfile,  setShowProfile]  = useState(false);
  const [profForm,     setProfForm]     = useState({name:userData.name||""});
  const [showLogout,   setShowLogout]   = useState(false);

  // Сохранение на Firebase при изменении данных
  useEffect(()=>{
    const updated = {expenses,goals,settings:{lang,currency,theme,dailyBudget,notifications}};
    setUserData(p=>({...p,...updated}));
    if (userKey) {
      lsSet("dayspent_userdata", {...(lsGet("dayspent_userdata")||{}), ...updated});
      fbSaveUser(userKey, updated).catch(e=>console.warn("Save warning:", e));
    }
  },[expenses,goals,lang,currency,theme,dailyBudget,notifications]);

  const T = {
    ru:{
      dashboard:"Обзор",expenses:"Расходы",analytics:"Аналитика",settings:"Настройки",piggy:"Копилка",
      today:"Сегодня",total:"Всего",week:"Неделя",byCat:"По категориям",recent:"Последние",allA:"Все →",
      dist:"Распределение",details:"Детали по категориям",byDays:"По дням недели",
      newE:"Новый расход",editE:"Редактировать",saveC:"Сохранить изменения",addE:"Добавить расход",
      amL:"СУММА",catL:"КАТЕГОРИЯ",noteL:"ЗАМЕТКА",dateL:"ДАТА",notePh:"Описание расхода...",
      ops:"операций",noData:"Нет данных",noExp:"Нет расходов",
      updated:"Расход обновлён",added:"Расход добавлен",deleted:"Удалено",
      lang:"Язык",cur:"Валюта",themeL:"Тема",budget:"Дневной бюджет",budgetH:"Лимит расходов в день",
      notifL:"Уведомления",notifH:"Напоминания о расходах",dataL:"Данные",clearD:"Очистить все данные",
      clearQ:"Вы уверены? Все расходы будут удалены.",yes:"Да, удалить",cancel:"Отмена",
      ver:"Версия 2.0.0",made:"Сделано с ❤️",
      bLabel:"Бюджет на день",bOver:"Превышен бюджет!",bOf:"из",savedM:"Сохранено",days:DAYS_RU,
      addG:"Новая цель",gTarget:"Целевая сумма",gSaved:"Уже накоплено",gColor:"ЦВЕТ",
      deposit:"Пополнить",withdraw:"Снять",gAdded:"Цель создана!",gDel:"Цель удалена",
      depDone:"Пополнено!",wDone:"Снято!",noGoals:"Нет целей. Создайте первую!",
      rem:"осталось",comp:"выполнено",editG:"Редактировать",saveG:"Сохранить цель",createG:"Создать цель",
      totSaved:"Всего накоплено",totGoals:"Целей",
      account:"Аккаунт",logout:"Выйти",logoutQ:"Вы уверены, что хотите выйти?",logoutY:"Выйти",
      editProf:"Редактировать профиль",saveProf:"Сохранить",nameL:"ИМЯ",emailL:"EMAIL",
      profSaved:"Профиль обновлён",myAcc:"Мой кабинет",
    },
    en:{
      dashboard:"Overview",expenses:"Expenses",analytics:"Analytics",settings:"Settings",piggy:"Savings",
      today:"Today",total:"Total",week:"Week",byCat:"By Category",recent:"Recent",allA:"All →",
      dist:"Distribution",details:"Category Details",byDays:"By Day of Week",
      newE:"New Expense",editE:"Edit Expense",saveC:"Save Changes",addE:"Add Expense",
      amL:"AMOUNT",catL:"CATEGORY",noteL:"NOTE",dateL:"DATE",notePh:"Expense description...",
      ops:"transactions",noData:"No data",noExp:"No expenses",
      updated:"Expense updated",added:"Expense added",deleted:"Deleted",
      lang:"Language",cur:"Currency",themeL:"Theme",budget:"Daily Budget",budgetH:"Daily spending limit",
      notifL:"Notifications",notifH:"Spending reminders",dataL:"Data",clearD:"Clear all data",
      clearQ:"Are you sure? All expenses will be deleted.",yes:"Yes, delete",cancel:"Cancel",
      ver:"Version 2.0.0",made:"Made with ❤️",
      bLabel:"Daily budget",bOver:"Budget exceeded!",bOf:"of",savedM:"Saved",days:DAYS_EN,
      addG:"New Goal",gTarget:"Target amount",gSaved:"Already saved",gColor:"COLOR",
      deposit:"Add funds",withdraw:"Withdraw",gAdded:"Goal created!",gDel:"Goal deleted",
      depDone:"Deposited!",wDone:"Withdrawn!",noGoals:"No goals. Create your first!",
      rem:"remaining",comp:"completed",editG:"Edit",saveG:"Save goal",createG:"Create goal",
      totSaved:"Total saved",totGoals:"Goals",
      account:"Account",logout:"Log out",logoutQ:"Are you sure you want to log out?",logoutY:"Log out",
      editProf:"Edit profile",saveProf:"Save",nameL:"NAME",emailL:"EMAIL",
      profSaved:"Profile updated",myAcc:"My Account",
    }
  }[lang];

  const CT   = THEMES.find(t=>t.id===theme)||THEMES[0];
  const M    = (n) => fmtMoney(n, currency);
  const CSym = CURRENCIES.find(c=>c.id===currency)?.symbol||"₽";
  const showT = (msg,type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),2500); };

  const totToday = expenses.filter(e=>e.date===todayStr()).reduce((s,e)=>s+e.amount,0);
  const totAll   = expenses.reduce((s,e)=>s+e.amount,0);
  const budN     = Number(dailyBudget)||0;
  const budNinRub = budN>0 ? budN / (RATES[currency]||1) : 0;
  const budPct   = budNinRub>0?Math.min(totToday/budNinRub,1):0;
  const byCat    = CATEGORIES.map(cat=>({...cat,total:expenses.filter(e=>e.category===cat.id).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const maxCat   = byCat[0]?.total||1;
  const sortedE  = [...(filterCat==="all"?expenses:expenses.filter(e=>e.category===filterCat))].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  const getCat   = (id) => CATEGORIES.find(c=>c.id===id)||CATEGORIES[6];
  const wkData   = Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    return {day:T.days[(d.getDay()+6)%7],total:expenses.filter(e=>e.date===k).reduce((s,e)=>s+e.amount,0),isToday:k===todayStr()};
  });
  const maxWk = Math.max(...wkData.map(w=>w.total),1);

  const openAdd  = () => { setEditId(null); setForm({amount:"",category:"food",note:"",date:todayStr()}); setShowModal(true); };
  const openEdit = (e) => { setEditId(e.id); const rate=RATES[currency]||1; setForm({amount:String(Math.round(e.amount*rate)),category:e.category,note:e.note,date:e.date}); setShowModal(true); };
  const saveExp  = () => {
    if(!form.amount||isNaN(+form.amount)||+form.amount<=0) return;
    const rate = RATES[currency]||1;
    const amtInRub = +form.amount / rate;
    if(editId){setExpenses(p=>p.map(e=>e.id===editId?{...e,...form,amount:amtInRub}:e));showT(T.updated);}
    else{setExpenses(p=>[...p,{id:nextId.current++,...form,amount:amtInRub}]);showT(T.added);}
    setShowModal(false);
  };
  const delExp = (id) => { setExpenses(p=>p.filter(e=>e.id!==id)); showT(T.deleted,"error"); };

  const openAddGoal  = () => { setEditGoalId(null); setGoalForm({name:"",target:"",saved:"",color:"#4ECDC4",icon:"🎯"}); setShowGoalModal(true); };
  const openEditGoal = (g) => { setEditGoalId(g.id); const rate=RATES[currency]||1; setGoalForm({name:g.name,target:String(Math.round(g.target*rate)),saved:String(Math.round(g.saved*rate)),color:g.color,icon:g.icon}); setShowGoalModal(true); };
  const saveGoal     = () => {
    if(!goalForm.name||+goalForm.target<=0) return;
    const rate=RATES[currency]||1;
    const tgt=+goalForm.target/rate; const sav=(+goalForm.saved||0)/rate;
    if(editGoalId){setGoals(p=>p.map(g=>g.id===editGoalId?{...g,...goalForm,target:tgt,saved:sav}:g));}
    else{setGoals(p=>[...p,{id:nextGid.current++,...goalForm,target:tgt,saved:sav}]);showT(T.gAdded);}
    setShowGoalModal(false);
  };
  const delGoal  = (id) => { setGoals(p=>p.filter(g=>g.id!==id)); showT(T.gDel,"error"); };
  const doDeposit= () => {
    const amt=+depositForm.amount; if(!amt||amt<=0) return;
    const rate=RATES[currency]||1;
    const amtInRub=amt/rate;
    setGoals(p=>p.map(g=>g.id!==showDeposit?g:{...g,saved:depositForm.isWithdraw?Math.max(0,g.saved-amtInRub):g.saved+amtInRub}));
    showT(depositForm.isWithdraw?T.wDone:T.depDone);
    setShowDeposit(null); setDepositForm({amount:"",isWithdraw:false});
  };
  const saveProfile = () => {
    if(!profForm.name.trim()) return;
    fbSaveUser(userKey, {name: profForm.name.trim()});
    setUserData(p=>({...p,name:profForm.name.trim()}));
    showT(T.profSaved); setShowProfile(false);
  };

  const userName = userData.name||userKey;
  const av = getAvatarColor(userName);

  const CSS = `
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
    html,body{margin:0;padding:0;overflow-x:hidden;width:100%}
    *{box-sizing:border-box;margin:0;padding:0}
    ::-webkit-scrollbar{width:0}
    input,textarea,select{outline:none;border:none;background:none;color:inherit;font-family:inherit}
    .tap{transition:transform .12s,opacity .12s;cursor:pointer}.tap:active{transform:scale(.94);opacity:.85}
    .pEnter{animation:pUp .3s cubic-bezier(.22,1,.36,1)}
    @keyframes pUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .tAnim{animation:tIn .3s cubic-bezier(.22,1,.36,1)}
    @keyframes tIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
    .mEnter{animation:mIn .25s cubic-bezier(.22,1,.36,1)}
    @keyframes mIn{from{opacity:0;transform:translateY(40px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .bAnim{animation:bG .6s cubic-bezier(.22,1,.36,1) forwards;transform-origin:bottom}
    @keyframes bG{from{transform:scaleY(0)}to{transform:scaleY(1)}}
    .nav{transition:all .2s;cursor:pointer}
    .eRow{transition:background .15s}.eRow:hover{background:rgba(255,255,255,.04)}
    .chip{transition:all .15s;cursor:pointer}
    .tog{position:relative;width:46px;height:26px}
    .tog input{opacity:0;width:0;height:0}
    .slid{position:absolute;inset:0;border-radius:26px;background:rgba(255,255,255,.1);transition:.3s;cursor:pointer}
    .slid:before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
    input:checked+.slid{background:linear-gradient(135deg,#FF6B6B,#FF8E53)}
    input:checked+.slid:before{transform:translateX(20px)}
    .sr{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.05)}
    .sr:last-child{border-bottom:none}
  `;

  return (
    <div style={{minHeight:"100vh",background:CT.bg,color:"#F0EEE8",fontFamily:"'Outfit','Segoe UI',sans-serif",
      display:"flex",flexDirection:"column",width:"100%",maxWidth:430,margin:"0 auto",position:"relative",overflowX:"hidden"}}>
      <style>{CSS}</style>

      {/* HEADER */}
      <div style={{padding:"50px 20px 17px",background:`linear-gradient(180deg,${CT.card} 0%,${CT.bg} 100%)`,borderBottom:"1px solid rgba(255,255,255,.06)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:"#666",fontWeight:500,letterSpacing:1,textTransform:"uppercase"}}>
              {new Date().toLocaleDateString(lang==="ru"?"ru-RU":"en-US",{weekday:"long",day:"numeric",month:"long"})}
            </div>
            <div style={{fontSize:21,fontWeight:800,marginTop:3,letterSpacing:-.5}}>
              {page==="dashboard"?T.dashboard:page==="expenses"?T.expenses:page==="analytics"?T.analytics:page==="piggy"?T.piggy:T.settings}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            {page!=="settings"&&page!=="piggy"&&(
              <button className="tap" onClick={openAdd} style={{width:40,height:40,borderRadius:13,border:"none",background:"linear-gradient(135deg,#7B2FBE,#9D4EDD)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:21,cursor:"pointer",boxShadow:"0 4px 18px rgba(123,47,190,.5)"}}>+</button>
            )}
            <div className="tap" onClick={()=>setPage("settings")} style={{width:40,height:40,borderRadius:13,background:av,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:"#fff",cursor:"pointer",boxShadow:`0 4px 14px ${av}55`,border:page==="settings"?"3px solid #fff":"3px solid transparent",transition:"border .2s"}}>
              {getInitials(userName)}
            </div>
          </div>
        </div>
      </div>

      {/* PAGES */}
      <div style={{flex:1,overflowY:"auto",paddingBottom:84}} key={page} className="pEnter">

        {/* DASHBOARD */}
        {page==="dashboard"&&(
          <div style={{padding:"17px 15px"}}>
            {budNinRub>0&&(
              <div style={{background:CT.card,borderRadius:15,padding:"12px 15px",border:`1.5px solid ${totToday>budNinRub?"#FF6B6B44":"rgba(255,255,255,.06)"}`,marginBottom:13}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{fontSize:12,color:totToday>budNinRub?"#FF6B6B":"#888",fontWeight:600}}>{totToday>budNinRub?`⚠️ ${T.bOver}`:`📊 ${T.bLabel}`}</div>
                  <div style={{fontSize:12,color:"#888"}}>{M(totToday)} {T.bOf} {budN.toLocaleString()} {CSym}</div>
                </div>
                <div style={{height:5,background:"rgba(255,255,255,.06)",borderRadius:4}}>
                  <div style={{height:"100%",borderRadius:4,width:`${budPct*100}%`,background:totToday>budNinRub?"linear-gradient(90deg,#FF6B6B,#FF4444)":"linear-gradient(90deg,#4ECDC4,#A8E6CF)",transition:"width .6s"}}/>
                </div>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,marginBottom:17}}>
              <div style={{background:"linear-gradient(135deg,#11998E,#38EF7D)",borderRadius:19,padding:"17px 15px",boxShadow:"0 8px 28px rgba(17,153,142,.35)"}}>
                <div style={{fontSize:10,fontWeight:600,opacity:.85,letterSpacing:.8,textTransform:"uppercase"}}>{T.today}</div>
                <div style={{fontSize:23,fontWeight:800,marginTop:5,letterSpacing:-1}}>{M(totToday)}</div>
                <div style={{fontSize:11,opacity:.75,marginTop:3}}>{expenses.filter(e=>e.date===todayStr()).length} {T.ops}</div>
              </div>
              <div style={{background:`linear-gradient(135deg,${CT.card},${CT.bg}cc)`,borderRadius:19,padding:"17px 15px",border:"1px solid rgba(255,255,255,.08)"}}>
                <div style={{fontSize:10,fontWeight:600,color:"#888",letterSpacing:.8,textTransform:"uppercase"}}>{T.total}</div>
                <div style={{fontSize:23,fontWeight:800,marginTop:5,letterSpacing:-1,color:"#C3A6FF"}}>{M(totAll)}</div>
                <div style={{fontSize:11,color:"#888",marginTop:3}}>{expenses.length} {T.ops}</div>
              </div>
            </div>
            <div style={{background:CT.card,borderRadius:19,padding:"17px 13px",border:"1px solid rgba(255,255,255,.06)",marginBottom:17}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:13,color:"#ccc"}}>{T.week}</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:5,height:78}}>
                {wkData.map((w,i)=>(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                    <div style={{width:"100%",height:60,display:"flex",alignItems:"flex-end"}}>
                      <div className="bAnim" style={{width:"100%",height:`${Math.max(w.total/maxWk*100,4)}%`,borderRadius:6,background:w.isToday?"linear-gradient(180deg,#FF6B6B,#FF8E53)":"rgba(255,255,255,.1)",animationDelay:`${i*.05}s`}}/>
                    </div>
                    <div style={{fontSize:10,color:w.isToday?"#FF6B6B":"#555",fontWeight:w.isToday?700:400}}>{w.day}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:CT.card,borderRadius:19,padding:"17px 15px",border:"1px solid rgba(255,255,255,.06)",marginBottom:17}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:11,color:"#ccc"}}>{T.byCat}</div>
              {byCat.length===0&&<div style={{color:"#555",fontSize:13}}>{T.noData}</div>}
              {byCat.slice(0,5).map(cat=>(
                <div key={cat.id} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <div style={{fontSize:13,display:"flex",alignItems:"center",gap:7}}><span>{cat.icon}</span><span style={{fontWeight:500}}>{cat.label}</span></div>
                    <div style={{fontSize:13,fontWeight:700,color:cat.color}}>{M(cat.total)}</div>
                  </div>
                  <div style={{height:4,background:"rgba(255,255,255,.06)",borderRadius:4}}>
                    <div style={{height:"100%",borderRadius:4,width:`${cat.total/maxCat*100}%`,background:cat.color,transition:"width .6s"}}/>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:CT.card,borderRadius:19,padding:"17px 15px",border:"1px solid rgba(255,255,255,.06)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
                <div style={{fontSize:13,fontWeight:700,color:"#ccc"}}>{T.recent}</div>
                <div onClick={()=>setPage("expenses")} style={{fontSize:12,color:"#FF6B6B",cursor:"pointer",fontWeight:600}}>{T.allA}</div>
              </div>
              {expenses.slice(-4).reverse().map(exp=>{
                const cat=getCat(exp.category);
                return (
                  <div key={exp.id} className="eRow" style={{display:"flex",alignItems:"center",gap:11,padding:"8px 7px",borderRadius:11,marginBottom:3}}>
                    <div style={{width:35,height:35,borderRadius:10,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{cat.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600}}>{exp.note||cat.label}</div>
                      <div style={{fontSize:11,color:"#666",marginTop:1}}>{exp.date}</div>
                    </div>
                    <div style={{fontSize:14,fontWeight:700,color:cat.color}}>−{M(exp.amount)}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* EXPENSES */}
        {page==="expenses"&&(
          <div style={{padding:"17px 15px"}}>
            <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:4,marginBottom:13}}>
              {[{id:"all",label:lang==="ru"?"Все":"All",icon:"✦",color:"#FF6B6B"},...CATEGORIES].map(cat=>(
                <div key={cat.id} className="chip tap" onClick={()=>setFilterCat(cat.id)} style={{padding:"6px 13px",borderRadius:50,fontSize:12,fontWeight:600,whiteSpace:"nowrap",flexShrink:0,background:filterCat===cat.id?cat.color:"rgba(255,255,255,.07)",color:filterCat===cat.id?"#fff":"#888",border:`1.5px solid ${filterCat===cat.id?cat.color:"transparent"}`}}>
                  {cat.icon} {cat.label}
                </div>
              ))}
            </div>
            {sortedE.length===0&&<div style={{textAlign:"center",color:"#555",marginTop:60}}><div style={{fontSize:38,marginBottom:9}}>🧾</div>{T.noExp}</div>}
            {sortedE.map(exp=>{
              const cat=getCat(exp.category);
              return (
                <div key={exp.id} className="eRow" style={{display:"flex",alignItems:"center",gap:11,padding:"11px",borderRadius:15,marginBottom:7,background:CT.card,border:"1px solid rgba(255,255,255,.05)"}}>
                  <div style={{width:41,height:41,borderRadius:12,background:cat.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{cat.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600}}>{exp.note||cat.label}</div>
                    <div style={{fontSize:11,color:"#555",marginTop:2,display:"flex",gap:7}}>
                      <span>{exp.date}</span><span style={{color:cat.color+"cc"}}>• {cat.label}</span>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:15,fontWeight:800,color:cat.color}}>−{M(exp.amount)}</div>
                    <div style={{display:"flex",gap:5,marginTop:4,justifyContent:"flex-end"}}>
                      <button className="tap" onClick={()=>openEdit(exp)} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:7,padding:"3px 7px",fontSize:11,color:"#aaa",cursor:"pointer"}}>✏️</button>
                      <button className="tap" onClick={()=>delExp(exp.id)} style={{background:"rgba(255,107,107,.12)",border:"none",borderRadius:7,padding:"3px 7px",fontSize:11,color:"#FF6B6B",cursor:"pointer"}}>🗑</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ANALYTICS */}
        {page==="analytics"&&(
          <div style={{padding:"17px 15px"}}>
            <div style={{background:CT.card,borderRadius:19,padding:"21px",border:"1px solid rgba(255,255,255,.06)",marginBottom:17,textAlign:"center"}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:17,color:"#ccc"}}>{T.dist}</div>
              <svg width={148} height={148} viewBox="0 0 148 148">
                {(()=>{let off=0;const r=53,cx=74,cy=74,ci=2*Math.PI*r;return byCat.map(cat=>{const pct=cat.total/totAll;const d=pct*ci;const el=<circle key={cat.id} cx={cx} cy={cy} r={r} fill="none" stroke={cat.color} strokeWidth={19} strokeDasharray={`${d} ${ci-d}`} strokeDashoffset={-off*ci+ci/4} style={{transform:"rotate(-90deg)",transformOrigin:"center"}}/>;off+=pct;return el;})})()}
                <circle cx={74} cy={74} r={44} fill={CT.card}/>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:17}}>
              <div style={{fontSize:16,fontWeight:800}}>{editGoalId?T.editG:T.addG}</div>
              <button onClick={()=>setShowGoalModal(false)} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:9,width:29,height:29,cursor:"pointer",color:"#fff",fontSize:15}}>×</button>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:10,color:"#666",marginBottom:6,fontWeight:700,letterSpacing:.8}}>ИКОНКА</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {GOAL_ICONS.map(ic=>(
                  <div key={ic} className="tap" onClick={()=>setGoalForm(f=>({...f,icon:ic}))} style={{width:37,height:37,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,cursor:"pointer",background:goalForm.icon===ic?goalForm.color+"33":"rgba(255,255,255,.05)",border:`2px solid ${goalForm.icon===ic?goalForm.color:"transparent"}`}}>{ic}</div>
                ))}
              </div>
            </div>
            <div style={{background:"rgba(255,255,255,.05)",borderRadius:13,padding:"11px 14px",marginBottom:9,border:"1.5px solid rgba(255,255,255,.08)"}}>
              <div style={{fontSize:10,color:"#666",marginBottom:3,fontWeight:700,letterSpacing:.8}}>НАЗВАНИЕ</div>
              <input value={goalForm.name} onChange={e=>setGoalForm(f=>({...f,name:e.target.value}))} placeholder={lang==="ru"?"Моя цель...":"My goal..."} style={{width:"100%",fontSize:14,color:"#fff"}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:11}}>
              <div style={{background:"rgba(255,255,255,.05)",borderRadius:13,padding:"11px 12px",border:"1.5px solid rgba(255,255,255,.08)"}}>
                <div style={{fontSize:10,color:"#666",marginBottom:3,fontWeight:700,letterSpacing:.8}}>{T.gTarget}</div>
                <input type="number" value={goalForm.target} onChange={e=>setGoalForm(f=>({...f,target:e.target.value}))} placeholder="0" style={{width:"100%",fontSize:16,fontWeight:800,color:"#4ECDC4"}}/>
              </div>
              <div style={{background:"rgba(255,255,255,.05)",borderRadius:13,padding:"11px 12px",border:"1.5px solid rgba(255,255,255,.08)"}}>
                <div style={{fontSize:10,color:"#666",marginBottom:3,fontWeight:700,letterSpacing:.8}}>{T.gSaved}</div>
                <input type="number" value={goalForm.saved} onChange={e=>setGoalForm(f=>({...f,saved:e.target.value}))} placeholder="0" style={{width:"100%",fontSize:16,fontWeight:800,color:"#C3A6FF"}}/>
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:10,color:"#666",marginBottom:6,fontWeight:700,letterSpacing:.8}}>{T.gColor}</div>
              <div style={{display:"flex",gap:8}}>
                {GOAL_COLORS.map(c=><div key={c} className="tap" onClick={()=>setGoalForm(f=>({...f,color:c}))} style={{width:27,height:27,borderRadius:8,background:c,cursor:"pointer",border:`3px solid ${goalForm.color===c?"#fff":"transparent"}`,boxShadow:goalForm.color===c?`0 0 9px ${c}88`:"none"}}/>)}
              </div>
            </div>
            <button className="tap" onClick={saveGoal} style={{width:"100%",padding:"13px",border:"none",borderRadius:14,cursor:"pointer",background:goalForm.name&&+goalForm.target>0?`linear-gradient(135deg,${goalForm.color},${goalForm.color}aa)`:"rgba(255,255,255,.08)",color:"#fff",fontSize:15,fontWeight:800,fontFamily:"inherit"}}>{editGoalId?T.saveG:T.createG}</button>
          </div>
        </div>
      )}

      {/* DEPOSIT MODAL */}
      {showDeposit!==null&&(()=>{const g=goals.find(g=>g.id===showDeposit);if(!g)return null;return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:150,padding:20}} onClick={e=>e.target===e.currentTarget&&setShowDeposit(null)}>
          <div className="mEnter" style={{background:CT.card,borderRadius:23,padding:"24px 21px",border:"1px solid rgba(255,255,255,.1)",maxWidth:320,width:"100%"}}>
            <div style={{textAlign:"center",marginBottom:17}}>
              <div style={{fontSize:33,marginBottom:4}}>{g.icon}</div>
              <div style={{fontSize:15,fontWeight:800}}>{g.name}</div>
            </div>
            <div style={{display:"flex",background:"rgba(255,255,255,.06)",borderRadius:12,padding:4,marginBottom:14}}>
              {[false,true].map(isW=>(
                <div key={String(isW)} className="tap" onClick={()=>setDepositForm(f=>({...f,isWithdraw:isW}))} style={{flex:1,padding:"8px",borderRadius:9,textAlign:"center",cursor:"pointer",background:depositForm.isWithdraw===isW?(isW?"rgba(255,107,107,.2)":g.color+"33"):"transparent",color:depositForm.isWithdraw===isW?(isW?"#FF6B6B":g.color):"#666",fontWeight:700,fontSize:12,transition:"all .2s"}}>
                  {isW?`− ${T.withdraw}`:`+ ${T.deposit}`}
                </div>
              ))}
            </div>
            <div style={{background:"rgba(255,255,255,.05)",borderRadius:14,padding:"13px",marginBottom:15,border:`1.5px solid ${depositForm.isWithdraw?"#FF6B6B44":g.color+"44"}`}}>
              <div style={{fontSize:10,color:"#666",marginBottom:4,fontWeight:700,letterSpacing:.8}}>{T.amL}</div>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <input type="number" value={depositForm.amount} onChange={e=>setDepositForm(f=>({...f,amount:e.target.value}))} placeholder="0" style={{flex:1,fontSize:25,fontWeight:800,color:depositForm.isWithdraw?"#FF6B6B":g.color}}/>
                <span style={{fontSize:17,color:"#555"}}>{CSym}</span>
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button className="tap" onClick={()=>setShowDeposit(null)} style={{flex:1,padding:"11px",background:"rgba(255,255,255,.07)",border:"none",borderRadius:12,color:"#fff",fontSize:13,fontWeight:600,fontFamily:"inherit",cursor:"pointer"}}>{T.cancel}</button>
              <button className="tap" onClick={doDeposit} style={{flex:2,padding:"11px",border:"none",borderRadius:12,cursor:"pointer",background:depositForm.isWithdraw?"linear-gradient(135deg,#FF6B6B,#FF4444)":`linear-gradient(135deg,${g.color},${g.color}aa)`,color:"#fff",fontSize:13,fontWeight:800,fontFamily:"inherit"}}>
                {depositForm.isWithdraw?`− ${T.withdraw}`:`+ ${T.deposit}`}
              </button>
            </div>
          </div>
        </div>
      );})()}

      {/* PROFILE MODAL */}
      {showProfile&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:160,padding:20}} onClick={e=>e.target===e.currentTarget&&setShowProfile(false)}>
          <div className="mEnter" style={{background:CT.card,borderRadius:23,padding:"24px 21px",border:"1px solid rgba(255,255,255,.1)",maxWidth:330,width:"100%"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontSize:15,fontWeight:800}}>{T.editProf}</div>
              <button onClick={()=>setShowProfile(false)} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:9,width:29,height:29,cursor:"pointer",color:"#fff",fontSize:15}}>×</button>
            </div>
            <div style={{display:"flex",justifyContent:"center",marginBottom:17}}>
              <div style={{width:62,height:62,borderRadius:19,background:getAvatarColor(profForm.name||userKey),display:"flex",alignItems:"center",justifyContent:"center",fontSize:21,fontWeight:800,color:"#fff",boxShadow:`0 6px 18px ${getAvatarColor(profForm.name||userKey)}55`}}>{getInitials(profForm.name||userKey)}</div>
            </div>
            <div style={{background:"rgba(255,255,255,.05)",borderRadius:13,padding:"12px 14px",marginBottom:10,border:"1.5px solid rgba(255,255,255,.08)"}}>
              <div style={{fontSize:10,color:"#666",marginBottom:3,fontWeight:700,letterSpacing:.8}}>{T.nameL}</div>
              <input value={profForm.name} onChange={e=>setProfForm(f=>({...f,name:e.target.value}))} placeholder="Ваше имя" style={{width:"100%",fontSize:15,color:"#fff"}}/>
            </div>
            <div style={{background:"rgba(255,255,255,.04)",borderRadius:13,padding:"12px 14px",marginBottom:17,border:"1.5px solid rgba(255,255,255,.05)"}}>
              <div style={{fontSize:10,color:"#555",marginBottom:3,fontWeight:700,letterSpacing:.8}}>{T.emailL}</div>
              <div style={{fontSize:14,color:"#555"}}>{userKey}</div>
            </div>
            <button className="tap" onClick={saveProfile} style={{width:"100%",padding:"13px",border:"none",borderRadius:13,cursor:"pointer",background:"linear-gradient(135deg,#FF6B6B,#FF8E53)",color:"#fff",fontSize:14,fontWeight:800,fontFamily:"inherit"}}>{T.saveProf}</button>
          </div>
        </div>
      )}

      {/* LOGOUT CONFIRM */}
      {showLogout&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:170,padding:20}} onClick={e=>e.target===e.currentTarget&&setShowLogout(false)}>
          <div className="mEnter" style={{background:CT.card,borderRadius:23,padding:"26px 21px",border:"1px solid rgba(255,255,255,.1)",maxWidth:310,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:11}}>🚪</div>
            <div style={{fontSize:15,fontWeight:800,marginBottom:7}}>{T.logout}</div>
            <div style={{fontSize:13,color:"#888",marginBottom:21}}>{T.logoutQ}</div>
            <div style={{display:"flex",gap:9}}>
              <button className="tap" onClick={()=>setShowLogout(false)} style={{flex:1,padding:"11px",background:"rgba(255,255,255,.08)",border:"none",borderRadius:12,color:"#fff",fontSize:13,fontWeight:600,fontFamily:"inherit",cursor:"pointer"}}>{T.cancel}</button>
              <button className="tap" onClick={()=>{setShowLogout(false);onLogout();}} style={{flex:1,padding:"11px",background:"linear-gradient(135deg,#FF6B6B,#FF4444)",border:"none",borderRadius:12,color:"#fff",fontSize:13,fontWeight:800,fontFamily:"inherit",cursor:"pointer"}}>{T.logoutY}</button>
            </div>
          </div>
        </div>
      )}

      {/* CLEAR CONFIRM */}
      {showClear&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:170,padding:20}} onClick={e=>e.target===e.currentTarget&&setShowClear(false)}>
          <div className="mEnter" style={{background:CT.card,borderRadius:23,padding:"26px 21px",border:"1px solid rgba(255,255,255,.1)",maxWidth:310,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:11}}>⚠️</div>
            <div style={{fontSize:15,fontWeight:800,marginBottom:7}}>{T.clearD}</div>
            <div style={{fontSize:13,color:"#888",marginBottom:21}}>{T.clearQ}</div>
            <div style={{display:"flex",gap:9}}>
              <button className="tap" onClick={()=>setShowClear(false)} style={{flex:1,padding:"11px",background:"rgba(255,255,255,.08)",border:"none",borderRadius:12,color:"#fff",fontSize:13,fontWeight:600,fontFamily:"inherit",cursor:"pointer"}}>{T.cancel}</button>
              <button className="tap" onClick={()=>{setExpenses([]);setShowClear(false);showT(T.deleted,"error");}} style={{flex:1,padding:"11px",background:"linear-gradient(135deg,#FF6B6B,#FF4444)",border:"none",borderRadius:12,color:"#fff",fontSize:13,fontWeight:800,fontFamily:"inherit",cursor:"pointer"}}>{T.yes}</button>
            </div>
          </div>
        </div>
      )}

      {/* TOAST */}
      {toast&&(
        <div className="tAnim" style={{position:"fixed",top:56,right:13,zIndex:300,background:toast.type==="error"?"#FF6B6B":"#4ECDC4",color:"#fff",padding:"8px 15px",borderRadius:12,fontSize:13,fontWeight:700,boxShadow:"0 8px 22px rgba(0,0,0,.3)"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>

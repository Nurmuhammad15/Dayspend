<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>DaySpent - Управление финансами</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0F0F13;font-family:'Segoe UI',-apple-system,sans-serif}
    .tap{cursor:pointer;transition:transform 0.1s,opacity 0.1s}
    .tap:active{transform:scale(0.96);opacity:0.8}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Константы
    const CATEGORIES = [
      { id:"food", label:"Еда", icon:"🍽️", color:"#FF6B6B" },
      { id:"transport", label:"Транспорт", icon:"🚇", color:"#4ECDC4" },
      { id:"shopping", label:"Покупки", icon:"🛍️", color:"#FFE66D" },
      { id:"health", label:"Здоровье", icon:"💊", color:"#A8E6CF" },
      { id:"entertainment", label:"Развлечения", icon:"🎬", color:"#C3A6FF" },
      { id:"utilities", label:"Коммунальные", icon:"💡", color:"#FFB347" },
      { id:"other", label:"Другое", icon:"📦", color:"#B0B0B0" },
    ];

    const CURRENCIES = [
      { id:"RUB", symbol:"₽", label:"Российский рубль", flag:"🇷🇺" },
      { id:"USD", symbol:"$", label:"Доллар США", flag:"🇺🇸" },
      { id:"EUR", symbol:"€", label:"Евро", flag:"🇪🇺" },
    ];

    // Функции для работы с localStorage
    function getUsers() {
      const users = localStorage.getItem("dayspent_users");
      return users ? JSON.parse(users) : {};
    }

    function saveUsers(users) {
      localStorage.setItem("dayspent_users", JSON.stringify(users));
    }

    function getUser(email) {
      const users = getUsers();
      return users[email.toLowerCase()] || null;
    }

    function createUser(email, password, name) {
      const users = getUsers();
      const key = email.toLowerCase();
      if (users[key]) return null;
      
      users[key] = {
        email: key,
        password: password,
        name: name.trim(),
        expenses: [],
        goals: [],
        settings: {
          lang: "ru",
          currency: "RUB",
          theme: "dark",
          dailyBudget: ""
        },
        createdAt: new Date().toISOString()
      };
      saveUsers(users);
      return users[key];
    }

    function updateUser(email, data) {
      const users = getUsers();
      const key = email.toLowerCase();
      if (users[key]) {
        users[key] = { ...users[key], ...data };
        saveUsers(users);
      }
    }

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    function fmtMoney(amount, currency) {
      const cur = CURRENCIES.find(c => c.id === currency) || CURRENCIES[0];
      return Math.round(amount) + " " + cur.symbol;
    }

    function getInitials(name) {
      return name ? name.substring(0, 2).toUpperCase() : "U";
    }

    // Компонент входа
    function AuthScreen({ onLogin }) {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [name, setName] = useState("");
      const [confirmPassword, setConfirmPassword] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        setError("");
        setLoading(true);

        setTimeout(() => {
          if (isLogin) {
            const user = getUser(email);
            if (!user) {
              setError("Аккаунт не найден");
            } else if (user.password !== password) {
              setError("Неверный пароль");
            } else {
              localStorage.setItem("dayspent_session", user.email);
              onLogin(user.email, user);
            }
          } else {
            if (!name.trim()) {
              setError("Введите имя");
              setLoading(false);
              return;
            }
            if (password.length < 6) {
              setError("Пароль должен быть минимум 6 символов");
              setLoading(false);
              return;
            }
            if (password !== confirmPassword) {
              setError("Пароли не совпадают");
              setLoading(false);
              return;
            }
            
            const user = createUser(email, password, name);
            if (!user) {
              setError("Email уже зарегистрирован");
            } else {
              localStorage.setItem("dayspent_session", user.email);
              onLogin(user.email, user);
            }
          }
          setLoading(false);
        }, 500);
      };

      return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#0F0F13", padding: "20px" }}>
          <div style={{ background: "#1A1A24", borderRadius: "24px", padding: "32px", width: "100%", maxWidth: "400px", border: "1px solid rgba(255,255,255,0.1)" }}>
            <div style={{ textAlign: "center", marginBottom: "32px" }}>
              <div style={{ fontSize: "48px", marginBottom: "8px" }}>💰</div>
              <h1 style={{ color: "#fff", fontSize: "28px", fontWeight: "bold" }}>DaySpent</h1>
              <p style={{ color: "#888", marginTop: "8px" }}>Управляй своими финансами</p>
            </div>

            <form onSubmit={handleSubmit}>
              {!isLogin && (
                <input
                  type="text"
                  placeholder="Ваше имя"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  style={{ width: "100%", padding: "14px", marginBottom: "12px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", fontSize: "16px", outline: "none" }}
                />
              )}
              <input
                type="email"
                placeholder="Email"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                style={{ width: "100%", padding: "14px", marginBottom: "12px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", fontSize: "16px", outline: "none" }}
              />
              <input
                type="password"
                placeholder="Пароль"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                style={{ width: "100%", padding: "14px", marginBottom: "12px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", fontSize: "16px", outline: "none" }}
              />
              {!isLogin && (
                <input
                  type="password"
                  placeholder="Подтвердите пароль"
                  value={confirmPassword}
                  onChange={(e) => setConfirmPassword(e.target.value)}
                  style={{ width: "100%", padding: "14px", marginBottom: "12px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", fontSize: "16px", outline: "none" }}
                />
              )}
              
              {error && (
                <div style={{ background: "rgba(255,107,107,0.15)", color: "#FF6B6B", padding: "12px", borderRadius: "12px", marginBottom: "12px", fontSize: "14px", border: "1px solid rgba(255,107,107,0.3)" }}>
                  ⚠️ {error}
                </div>
              )}
              
              <button
                type="submit"
                disabled={loading}
                style={{ width: "100%", padding: "14px", background: "linear-gradient(135deg,#FF6B6B,#FF8E53)", border: "none", borderRadius: "12px", color: "#fff", fontSize: "16px", fontWeight: "bold", cursor: "pointer", opacity: loading ? 0.7 : 1, transition: "opacity 0.2s" }}
              >
                {loading ? "Загрузка..." : (isLogin ? "Войти" : "Зарегистрироваться")}
              </button>
            </form>

            <div style={{ textAlign: "center", marginTop: "20px" }}>
              <button
                onClick={() => { setIsLogin(!isLogin); setError(""); }}
                style={{ background: "none", border: "none", color: "#FF6B6B", cursor: "pointer", fontSize: "14px" }}
              >
                {isLogin ? "📝 Создать аккаунт" : "🔑 Уже есть аккаунт? Войти"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Главное приложение
    function MainApp({ userKey, userData, setUserData, onLogout }) {
      const [page, setPage] = useState("dashboard");
      const [expenses, setExpenses] = useState(userData.expenses || []);
      const [showModal, setShowModal] = useState(false);
      const [formAmount, setFormAmount] = useState("");
      const [formCategory, setFormCategory] = useState("food");
      const [formNote, setFormNote] = useState("");
      const [currency, setCurrency] = useState(userData.settings?.currency || "RUB");
      const [toast, setToast] = useState(null);
      const nextId = useRef(expenses.length + 100);

      const showToast = (msg, isError = false) => {
        setToast({ msg, isError });
        setTimeout(() => setToast(null), 2000);
      };

      const addExpense = () => {
        if (!formAmount || parseFloat(formAmount) <= 0) {
          showToast("Введите сумму", true);
          return;
        }
        
        const newExpense = {
          id: nextId.current++,
          amount: parseFloat(formAmount),
          category: formCategory,
          note: formNote.trim() || CATEGORIES.find(c => c.id === formCategory).label,
          date: todayStr()
        };
        
        const newExpenses = [...expenses, newExpense];
        setExpenses(newExpenses);
        
        const updatedData = { ...userData, expenses: newExpenses };
        setUserData(updatedData);
        updateUser(userKey, { expenses: newExpenses });
        
        setShowModal(false);
        setFormAmount("");
        setFormNote("");
        showToast("✅ Расход добавлен");
      };

      const deleteExpense = (id) => {
        const newExpenses = expenses.filter(e => e.id !== id);
        setExpenses(newExpenses);
        setUserData({ ...userData, expenses: newExpenses });
        updateUser(userKey, { expenses: newExpenses });
        showToast("🗑️ Расход удален", true);
      };

      const totalToday = expenses.filter(e => e.date === todayStr()).reduce((sum, e) => sum + e.amount, 0);
      const totalAll = expenses.reduce((sum, e) => sum + e.amount, 0);

      const getCategory = (id) => CATEGORIES.find(c => c.id === id) || CATEGORIES[6];

      const updateCurrency = (newCurrency) => {
        setCurrency(newCurrency);
        const newSettings = { ...userData.settings, currency: newCurrency };
        setUserData({ ...userData, settings: newSettings });
        updateUser(userKey, { settings: newSettings });
        showToast("Валюта изменена");
      };

      return (
        <div style={{ maxWidth: "430px", margin: "0 auto", background: "#0F0F13", minHeight: "100vh", color: "#fff" }}>
          {/* Header */}
          <div style={{ padding: "20px", background: "linear-gradient(135deg, #1A1A24, #0F0F13)", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: "12px", color: "#888", textTransform: "uppercase", letterSpacing: "1px" }}>{new Date().toLocaleDateString()}</div>
                <h2 style={{ marginTop: "4px", fontSize: "24px", fontWeight: "bold" }}>
                  {page === "dashboard" && "📊 Обзор"}
                  {page === "expenses" && "💳 Расходы"}
                  {page === "settings" && "⚙️ Настройки"}
                </h2>
              </div>
              <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
                {page !== "settings" && (
                  <button onClick={() => setShowModal(true)} className="tap" style={{ background: "linear-gradient(135deg,#FF6B6B,#FF8E53)", border: "none", width: "40px", height: "40px", borderRadius: "12px", fontSize: "20px", cursor: "pointer", color: "#fff", fontWeight: "bold" }}>+</button>
                )}
                <div onClick={() => setPage("settings")} className="tap" style={{ width: "40px", height: "40px", borderRadius: "12px", background: "#4ECDC4", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: "bold", fontSize: "16px", color: "#fff" }}>
                  {getInitials(userData.name)}
                </div>
              </div>
            </div>
          </div>

          {/* Content */}
          <div style={{ padding: "20px", paddingBottom: "80px" }}>
            {page === "dashboard" && (
              <>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "20px" }}>
                  <div style={{ background: "linear-gradient(135deg,#11998E,#38EF7D)", padding: "20px", borderRadius: "16px" }}>
                    <div style={{ fontSize: "11px", opacity: 0.8, textTransform: "uppercase", letterSpacing: "1px" }}>Сегодня</div>
                    <div style={{ fontSize: "28px", fontWeight: "bold", marginTop: "8px" }}>{fmtMoney(totalToday, currency)}</div>
                    <div style={{ fontSize: "11px", marginTop: "4px", opacity: 0.8 }}>{expenses.filter(e => e.date === todayStr()).length} операций</div>
                  </div>
                  <div style={{ background: "#1A1A24", padding: "20px", borderRadius: "16px", border: "1px solid rgba(255,255,255,0.05)" }}>
                    <div style={{ fontSize: "11px", color: "#888", textTransform: "uppercase", letterSpacing: "1px" }}>Всего</div>
                    <div style={{ fontSize: "28px", fontWeight: "bold", marginTop: "8px", color: "#C3A6FF" }}>{fmtMoney(totalAll, currency)}</div>
                    <div style={{ fontSize: "11px", color: "#888", marginTop: "4px" }}>{expenses.length} операций</div>
                  </div>
                </div>

                {expenses.length === 0 && (
                  <div style={{ textAlign: "center", padding: "60px 20px", color: "#888" }}>
                    <div style={{ fontSize: "64px", marginBottom: "16px" }}>💸</div>
                    <p style={{ fontSize: "16px", fontWeight: "bold" }}>Нет расходов</p>
                    <p style={{ fontSize: "13px", marginTop: "8px" }}>Нажмите кнопку <span style={{ color: "#FF6B6B" }}>+</span> чтобы добавить</p>
                  </div>
                )}

                {expenses.slice().reverse().slice(0, 5).map(exp => {
                  const cat = getCategory(exp.category);
                  return (
                    <div key={exp.id} style={{ background: "#1A1A24", padding: "14px", borderRadius: "12px", marginBottom: "8px", display: "flex", justifyContent: "space-between", alignItems: "center", border: "1px solid rgba(255,255,255,0.05)" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                        <div style={{ fontSize: "28px" }}>{cat.icon}</div>
                        <div>
                          <div style={{ fontWeight: "bold", fontSize: "14px" }}>{exp.note}</div>
                          <div style={{ fontSize: "10px", color: "#666", marginTop: "2px" }}>{exp.date}</div>
                        </div>
                      </div>
                      <div style={{ color: cat.color, fontWeight: "bold", fontSize: "16px" }}>-{fmtMoney(exp.amount, currency)}</div>
                    </div>
                  );
                })}
                
                {expenses.length > 5 && (
                  <button onClick={() => setPage("expenses")} className="tap" style={{ width: "100%", padding: "12px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#888", marginTop: "8px", cursor: "pointer" }}>📋 Показать все расходы</button>
                )}
              </>
            )}

            {page === "expenses" && (
              <>
                <div style={{ display: "flex", gap: "8px", overflowX: "auto", paddingBottom: "12px", marginBottom: "16px" }}>
                  {CATEGORIES.map(cat => (
                    <button key={cat.id} onClick={() => setPage("expenses")} style={{ padding: "8px 16px", background: "#2A2A35", border: "none", borderRadius: "20px", color: "#fff", fontSize: "13px", cursor: "pointer", whiteSpace: "nowrap" }}>{cat.icon} {cat.label}</button>
                  ))}
                </div>
                
                {expenses.length === 0 && (
                  <div style={{ textAlign: "center", padding: "60px 20px", color: "#888" }}>
                    <div style={{ fontSize: "64px", marginBottom: "16px" }}>📝</div>
                    <p>Нет расходов</p>
                  </div>
                )}
                
                {[...expenses].reverse().map(exp => {
                  const cat = getCategory(exp.category);
                  return (
                    <div key={exp.id} style={{ background: "#1A1A24", padding: "14px", borderRadius: "12px", marginBottom: "8px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                        <div style={{ fontSize: "28px" }}>{cat.icon}</div>
                        <div>
                          <div style={{ fontWeight: "bold" }}>{exp.note}</div>
                          <div style={{ fontSize: "11px", color: "#666", marginTop: "2px" }}>{exp.date}</div>
                        </div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                        <div style={{ color: cat.color, fontWeight: "bold" }}>-{fmtMoney(exp.amount, currency)}</div>
                        <button onClick={() => deleteExpense(exp.id)} className="tap" style={{ background: "rgba(255,107,107,0.15)", border: "none", padding: "6px 10px", borderRadius: "8px", cursor: "pointer", fontSize: "14px" }}>🗑️</button>
                      </div>
                    </div>
                  );
                })}
              </>
            )}

            {page === "settings" && (
              <>
                <div style={{ background: "#1A1A24", padding: "24px", borderRadius: "16px", marginBottom: "20px", textAlign: "center", border: "1px solid rgba(255,255,255,0.05)" }}>
                  <div style={{ width: "70px", height: "70px", borderRadius: "20px", background: "#4ECDC4", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "28px", margin: "0 auto 12px", fontWeight: "bold", color: "#fff" }}>
                    {getInitials(userData.name)}
                  </div>
                  <h3 style={{ fontSize: "18px" }}>{userData.name}</h3>
                  <p style={{ color: "#888", fontSize: "12px", marginTop: "4px" }}>{userData.email}</p>
                </div>

                <div style={{ background: "#1A1A24", padding: "20px", borderRadius: "16px", marginBottom: "12px" }}>
                  <div style={{ marginBottom: "12px", color: "#888", fontSize: "11px", textTransform: "uppercase", letterSpacing: "1px" }}>💰 Валюта</div>
                  <div style={{ display: "flex", gap: "12px" }}>
                    {CURRENCIES.map(c => (
                      <button
                        key={c.id}
                        onClick={() => updateCurrency(c.id)}
                        className="tap"
                        style={{ flex: 1, padding: "12px", background: currency === c.id ? "linear-gradient(135deg,#FF6B6B,#FF8E53)" : "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", cursor: "pointer", fontWeight: currency === c.id ? "bold" : "normal" }}
                      >
                        {c.flag} {c.symbol}
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{ background: "#1A1A24", padding: "20px", borderRadius: "16px", marginBottom: "12px" }}>
                  <div style={{ marginBottom: "12px", color: "#888", fontSize: "11px", textTransform: "uppercase", letterSpacing: "1px" }}>📊 Статистика</div>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                    <span>Всего расходов:</span>
                    <span style={{ fontWeight: "bold", color: "#C3A6FF" }}>{expenses.length}</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0" }}>
                    <span>Всего потрачено:</span>
                    <span style={{ fontWeight: "bold", color: "#C3A6FF" }}>{fmtMoney(totalAll, currency)}</span>
                  </div>
                </div>

                <button
                  onClick={() => { localStorage.removeItem("dayspent_session"); onLogout(); }}
                  className="tap"
                  style={{ width: "100%", padding: "14px", background: "rgba(255,107,107,0.15)", border: "1px solid rgba(255,107,107,0.3)", borderRadius: "12px", color: "#FF6B6B", cursor: "pointer", marginTop: "12px", fontSize: "14px", fontWeight: "bold" }}
                >
                  🚪 Выйти из аккаунта
                </button>
              </>
            )}
          </div>

          {/* Bottom Navigation */}
          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, maxWidth: "430px", margin: "0 auto", background: "#1A1A24", display: "flex", padding: "12px 20px", borderTop: "1px solid rgba(255,255,255,0.08)" }}>
            {[
              { id: "dashboard", label: "Обзор", icon: "📊" },
              { id: "expenses", label: "Расходы", icon: "💳" },
              { id: "settings", label: "Настройки", icon: "⚙️" },
            ].map(tab => (
              <div key={tab.id} onClick={() => setPage(tab.id)} className="tap" style={{ flex: 1, textAlign: "center", opacity: page === tab.id ? 1 : 0.5, transition: "opacity 0.2s" }}>
                <div style={{ fontSize: "24px" }}>{tab.icon}</div>
                <div style={{ fontSize: "11px", marginTop: "4px", fontWeight: page === tab.id ? "bold" : "normal" }}>{tab.label}</div>
              </div>
            ))}
          </div>

          {/* Add Expense Modal */}
          {showModal && (
            <div onClick={() => setShowModal(false)} style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.9)", display: "flex", alignItems: "flex-end", zIndex: 1000 }}>
              <div onClick={e => e.stopPropagation()} style={{ background: "#1A1A24", width: "100%", maxWidth: "430px", margin: "0 auto", borderRadius: "24px 24px 0 0", padding: "28px 24px", borderTop: "1px solid rgba(255,255,255,0.1)" }}>
                <h3 style={{ marginBottom: "20px", fontSize: "20px", fontWeight: "bold" }}>➕ Новый расход</h3>
                
                <input
                  type="number"
                  placeholder="Сумма"
                  value={formAmount}
                  onChange={e => setFormAmount(e.target.value)}
                  style={{ width: "100%", padding: "14px", marginBottom: "12px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", fontSize: "18px", outline: "none" }}
                  autoFocus
                />
                
                <select
                  value={formCategory}
                  onChange={e => setFormCategory(e.target.value)}
                  style={{ width: "100%", padding: "14px", marginBottom: "12px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", fontSize: "14px", outline: "none" }}
                >
                  {CATEGORIES.map(c => (
                    <option key={c.id} value={c.id}>{c.icon} {c.label}</option>
                  ))}
                </select>
                
                <input
                  type="text"
                  placeholder="Описание (необязательно)"
                  value={formNote}
                  onChange={e => setFormNote(e.target.value)}
                  style={{ width: "100%", padding: "14px", marginBottom: "20px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", fontSize: "14px", outline: "none" }}
                />
                
                <div style={{ display: "flex", gap: "12px" }}>
                  <button onClick={() => setShowModal(false)} className="tap" style={{ flex: 1, padding: "14px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", cursor: "pointer", fontSize: "14px" }}>Отмена</button>
                  <button onClick={addExpense} className="tap" style={{ flex: 2, padding: "14px", background: "linear-gradient(135deg,#FF6B6B,#FF8E53)", border: "none", borderRadius: "12px", color: "#fff", fontWeight: "bold", cursor: "pointer", fontSize: "14px" }}>Добавить</button>
                </div>
              </div>
            </div>
          )}

          {/* Toast */}
          {toast && (
            <div style={{ position: "fixed", bottom: "80px", left: "50%", transform: "translateX(-50%)", background: toast.isError ? "#FF6B6B" : "#4ECDC4", color: "#fff", padding: "12px 24px", borderRadius: "30px", fontSize: "13px", zIndex: 1001, boxShadow: "0 4px 15px rgba(0,0,0,0.3)" }}>
              {toast.msg}
            </div>
          )}
        </div>
      );
    }

    // Корневой компонент
    function App() {
      const [userKey, setUserKey] = useState(() => localStorage.getItem("dayspent_session"));
      const [userData, setUserData] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (userKey) {
          const user = getUser(userKey);
          if (user) {
            setUserData(user);
          } else {
            localStorage.removeItem("dayspent_session");
            setUserKey(null);
          }
        }
        setLoading(false);
      }, []);

      if (loading) {
        return <div style={{ display: "flex", justifyContent: "center", alignItems: "center", height: "100vh", background: "#0F0F13", color: "#fff" }}>⏳ Загрузка...</div>;
      }

      if (!userKey || !userData) {
        return <AuthScreen onLogin={(key, data) => { setUserKey(key); setUserData(data); }} />;
      }

      return <MainApp userKey={userKey} userData={userData} setUserData={setUserData} onLogout={() => { setUserKey(null); setUserData(null); }} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

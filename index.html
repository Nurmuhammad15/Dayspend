<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>DaySpent</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0F0F13;font-family:'Segoe UI',sans-serif}
    .tap{cursor:pointer;transition:transform 0.1s}
    .tap:active{transform:scale(0.95)}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Константы
    const CATEGORIES = [
      { id:"food", label:"🍽️ Еда", color:"#FF6B6B" },
      { id:"transport", label:"🚇 Транспорт", color:"#4ECDC4" },
      { id:"shopping", label:"🛍️ Покупки", color:"#FFE66D" },
      { id:"health", label:"💊 Здоровье", color:"#A8E6CF" },
      { id:"entertainment", label:"🎬 Развлечения", color:"#C3A6FF" },
      { id:"utilities", label:"💡 Коммунальные", color:"#FFB347" },
      { id:"other", label:"📦 Другое", color:"#B0B0B0" },
    ];

    const CURRENCIES = [
      { id:"RUB", symbol:"₽", label:"Российский рубль", flag:"🇷🇺" },
      { id:"USD", symbol:"$", label:"Доллар США", flag:"🇺🇸" },
      { id:"EUR", symbol:"€", label:"Евро", flag:"🇪🇺" },
    ];

    // Вспомогательные функции
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    function fmtMoney(amount, currency) {
      const cur = CURRENCIES.find(c => c.id === currency) || CURRENCIES[0];
      return Math.round(amount) + " " + cur.symbol;
    }

    function getInitials(name) {
      return name ? name.substring(0,2).toUpperCase() : "U";
    }

    // Работа с localStorage
    function getUsers() {
      const users = localStorage.getItem("dayspent_users");
      return users ? JSON.parse(users) : {};
    }

    function saveUsers(users) {
      localStorage.setItem("dayspent_users", JSON.stringify(users));
    }

    function getUser(email) {
      const users = getUsers();
      return users[email.toLowerCase()] || null;
    }

    function createUser(email, password, name) {
      const users = getUsers();
      const key = email.toLowerCase();
      if (users[key]) return null;
      
      users[key] = {
        email: key,
        password: password,
        name: name,
        expenses: [],
        goals: [],
        settings: {
          lang: "ru",
          currency: "RUB",
          theme: "dark",
          dailyBudget: ""
        },
        createdAt: new Date().toISOString()
      };
      saveUsers(users);
      return users[key];
    }

    function updateUser(email, data) {
      const users = getUsers();
      const key = email.toLowerCase();
      if (users[key]) {
        users[key] = { ...users[key], ...data };
        saveUsers(users);
      }
    }

    // Компонент входа
    function AuthScreen({ onLogin }) {
      const [isLogin, setIsLogin] = useState(true);
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [name, setName] = useState("");
      const [confirmPassword, setConfirmPassword] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError("");
        setLoading(true);

        setTimeout(() => {
          if (isLogin) {
            const user = getUser(email);
            if (!user) {
              setError("Аккаунт не найден");
            } else if (user.password !== password) {
              setError("Неверный пароль");
            } else {
              localStorage.setItem("dayspent_session", user.email);
              onLogin(user.email, user);
            }
          } else {
            if (!name.trim()) {
              setError("Введите имя");
              setLoading(false);
              return;
            }
            if (password.length < 6) {
              setError("Пароль должен быть минимум 6 символов");
              setLoading(false);
              return;
            }
            if (password !== confirmPassword) {
              setError("Пароли не совпадают");
              setLoading(false);
              return;
            }
            
            const user = createUser(email, password, name);
            if (!user) {
              setError("Email уже зарегистрирован");
            } else {
              localStorage.setItem("dayspent_session", user.email);
              onLogin(user.email, user);
            }
          }
          setLoading(false);
        }, 500);
      };

      return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#0F0F13", padding: "20px" }}>
          <div style={{ background: "#1A1A24", borderRadius: "24px", padding: "32px", width: "100%", maxWidth: "400px" }}>
            <div style={{ textAlign: "center", marginBottom: "32px" }}>
              <div style={{ fontSize: "48px", marginBottom: "8px" }}>💸</div>
              <h1 style={{ color: "#fff", fontSize: "28px" }}>DaySpent</h1>
              <p style={{ color: "#888", marginTop: "8px" }}>Управляй своими финансами</p>
            </div>

            <form onSubmit={handleSubmit}>
              {!isLogin && (
                <input
                  type="text"
                  placeholder="Имя"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  style={{ width: "100%", padding: "12px", marginBottom: "12px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", fontSize: "16px" }}
                />
              )}
              <input
                type="email"
                placeholder="Email"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                style={{ width: "100%", padding: "12px", marginBottom: "12px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", fontSize: "16px" }}
              />
              <input
                type="password"
                placeholder="Пароль"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                style={{ width: "100%", padding: "12px", marginBottom: "12px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", fontSize: "16px" }}
              />
              {!isLogin && (
                <input
                  type="password"
                  placeholder="Подтвердите пароль"
                  value={confirmPassword}
                  onChange={(e) => setConfirmPassword(e.target.value)}
                  style={{ width: "100%", padding: "12px", marginBottom: "12px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", fontSize: "16px" }}
                />
              )}
              
              {error && (
                <div style={{ background: "rgba(255,107,107,0.1)", color: "#FF6B6B", padding: "12px", borderRadius: "12px", marginBottom: "12px", fontSize: "14px" }}>
                  ⚠️ {error}
                </div>
              )}
              
              <button
                type="submit"
                disabled={loading}
                style={{ width: "100%", padding: "14px", background: "linear-gradient(135deg,#FF6B6B,#FF8E53)", border: "none", borderRadius: "12px", color: "#fff", fontSize: "16px", fontWeight: "bold", cursor: "pointer", opacity: loading ? 0.7 : 1 }}
              >
                {loading ? "Загрузка..." : (isLogin ? "Войти" : "Зарегистрироваться")}
              </button>
            </form>

            <div style={{ textAlign: "center", marginTop: "20px" }}>
              <button
                onClick={() => { setIsLogin(!isLogin); setError(""); }}
                style={{ background: "none", border: "none", color: "#FF6B6B", cursor: "pointer", fontSize: "14px" }}
              >
                {isLogin ? "Создать аккаунт" : "Уже есть аккаунт? Войти"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Главное приложение
    function MainApp({ userKey, userData, setUserData, onLogout }) {
      const [page, setPage] = useState("dashboard");
      const [expenses, setExpenses] = useState(userData.expenses || []);
      const [showModal, setShowModal] = useState(false);
      const [formAmount, setFormAmount] = useState("");
      const [formCategory, setFormCategory] = useState("food");
      const [formNote, setFormNote] = useState("");
      const [currency, setCurrency] = useState(userData.settings?.currency || "RUB");
      const [toast, setToast] = useState(null);
      const nextId = useRef(expenses.length + 1);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2000);
      };

      const addExpense = () => {
        if (!formAmount || parseFloat(formAmount) <= 0) return;
        
        const newExpense = {
          id: nextId.current++,
          amount: parseFloat(formAmount),
          category: formCategory,
          note: formNote || CATEGORIES.find(c => c.id === formCategory).label,
          date: todayStr()
        };
        
        const newExpenses = [...expenses, newExpense];
        setExpenses(newExpenses);
        
        const updatedData = { ...userData, expenses: newExpenses };
        setUserData(updatedData);
        updateUser(userKey, { expenses: newExpenses });
        
        setShowModal(false);
        setFormAmount("");
        setFormNote("");
        showToast("✅ Расход добавлен");
      };

      const deleteExpense = (id) => {
        const newExpenses = expenses.filter(e => e.id !== id);
        setExpenses(newExpenses);
        setUserData({ ...userData, expenses: newExpenses });
        updateUser(userKey, { expenses: newExpenses });
        showToast("🗑️ Расход удален");
      };

      const totalToday = expenses.filter(e => e.date === todayStr()).reduce((sum, e) => sum + e.amount, 0);
      const totalAll = expenses.reduce((sum, e) => sum + e.amount, 0);

      const getCategory = (id) => CATEGORIES.find(c => c.id === id) || CATEGORIES[6];

      return (
        <div style={{ maxWidth: "430px", margin: "0 auto", background: "#0F0F13", minHeight: "100vh", color: "#fff" }}>
          {/* Header */}
          <div style={{ padding: "20px", background: "linear-gradient(135deg, #1A1A24, #0F0F13)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: "12px", color: "#888" }}>{new Date().toLocaleDateString()}</div>
                <h2 style={{ marginTop: "4px" }}>
                  {page === "dashboard" && "Обзор"}
                  {page === "expenses" && "Расходы"}
                  {page === "settings" && "Настройки"}
                </h2>
              </div>
              <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
                {page !== "settings" && (
                  <button onClick={() => setShowModal(true)} style={{ background: "#FF6B6B", border: "none", width: "40px", height: "40px", borderRadius: "12px", fontSize: "20px", cursor: "pointer" }}>+</button>
                )}
                <div onClick={() => setPage("settings")} style={{ width: "40px", height: "40px", borderRadius: "12px", background: "#4ECDC4", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: "bold", cursor: "pointer" }}>
                  {getInitials(userData.name)}
                </div>
              </div>
            </div>
          </div>

          {/* Content */}
          <div style={{ padding: "20px" }}>
            {page === "dashboard" && (
              <>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "20px" }}>
                  <div style={{ background: "linear-gradient(135deg,#11998E,#38EF7D)", padding: "16px", borderRadius: "16px" }}>
                    <div style={{ fontSize: "12px", opacity: 0.8 }}>Сегодня</div>
                    <div style={{ fontSize: "24px", fontWeight: "bold", marginTop: "8px" }}>{fmtMoney(totalToday, currency)}</div>
                  </div>
                  <div style={{ background: "#1A1A24", padding: "16px", borderRadius: "16px" }}>
                    <div style={{ fontSize: "12px", color: "#888" }}>Всего</div>
                    <div style={{ fontSize: "24px", fontWeight: "bold", marginTop: "8px", color: "#C3A6FF" }}>{fmtMoney(totalAll, currency)}</div>
                  </div>
                </div>

                {expenses.length === 0 && (
                  <div style={{ textAlign: "center", padding: "40px", color: "#888" }}>
                    <div style={{ fontSize: "48px", marginBottom: "12px" }}>💸</div>
                    <p>Нет расходов</p>
                    <p style={{ fontSize: "12px", marginTop: "8px" }}>Нажмите + чтобы добавить</p>
                  </div>
                )}

                {expenses.slice(-5).reverse().map(exp => {
                  const cat = getCategory(exp.category);
                  return (
                    <div key={exp.id} style={{ background: "#1A1A24", padding: "12px", borderRadius: "12px", marginBottom: "8px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                        <div style={{ fontSize: "24px" }}>{cat.label.split(" ")[0]}</div>
                        <div>
                          <div style={{ fontWeight: "bold" }}>{exp.note}</div>
                          <div style={{ fontSize: "11px", color: "#888" }}>{exp.date}</div>
                        </div>
                      </div>
                      <div style={{ color: cat.color, fontWeight: "bold" }}>-{fmtMoney(exp.amount, currency)}</div>
                    </div>
                  );
                })}
              </>
            )}

            {page === "expenses" && (
              <>
                {expenses.length === 0 && (
                  <div style={{ textAlign: "center", padding: "40px", color: "#888" }}>
                    <div style={{ fontSize: "48px", marginBottom: "12px" }}>📝</div>
                    <p>Нет расходов</p>
                  </div>
                )}
                {[...expenses].reverse().map(exp => {
                  const cat = getCategory(exp.category);
                  return (
                    <div key={exp.id} style={{ background: "#1A1A24", padding: "12px", borderRadius: "12px", marginBottom: "8px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                        <div style={{ fontSize: "24px" }}>{cat.label.split(" ")[0]}</div>
                        <div>
                          <div style={{ fontWeight: "bold" }}>{exp.note}</div>
                          <div style={{ fontSize: "11px", color: "#888" }}>{exp.date}</div>
                        </div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                        <div style={{ color: cat.color, fontWeight: "bold" }}>-{fmtMoney(exp.amount, currency)}</div>
                        <button onClick={() => deleteExpense(exp.id)} style={{ background: "rgba(255,107,107,0.2)", border: "none", padding: "6px 10px", borderRadius: "8px", cursor: "pointer" }}>🗑️</button>
                      </div>
                    </div>
                  );
                })}
              </>
            )}

            {page === "settings" && (
              <>
                <div style={{ background: "#1A1A24", padding: "20px", borderRadius: "16px", marginBottom: "20px", textAlign: "center" }}>
                  <div style={{ width: "60px", height: "60px", borderRadius: "20px", background: "#4ECDC4", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "24px", margin: "0 auto 12px" }}>
                    {getInitials(userData.name)}
                  </div>
                  <h3>{userData.name}</h3>
                  <p style={{ color: "#888", fontSize: "12px", marginTop: "4px" }}>{userData.email}</p>
                </div>

                <div style={{ background: "#1A1A24", padding: "16px", borderRadius: "16px", marginBottom: "12px" }}>
                  <div style={{ marginBottom: "12px", color: "#888", fontSize: "12px" }}>ВАЛЮТА</div>
                  <div style={{ display: "flex", gap: "12px" }}>
                    {CURRENCIES.map(c => (
                      <button
                        key={c.id}
                        onClick={() => { setCurrency(c.id); updateUser(userKey, { settings: { ...userData.settings, currency: c.id } }); }}
                        style={{ flex: 1, padding: "12px", background: currency === c.id ? "#FF6B6B" : "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", cursor: "pointer" }}
                      >
                        {c.flag} {c.symbol}
                      </button>
                    ))}
                  </div>
                </div>

                <button
                  onClick={() => { localStorage.removeItem("dayspent_session"); onLogout(); }}
                  style={{ width: "100%", padding: "14px", background: "rgba(255,107,107,0.2)", border: "1px solid #FF6B6B", borderRadius: "12px", color: "#FF6B6B", cursor: "pointer", marginTop: "20px" }}
                >
                  🚪 Выйти из аккаунта
                </button>
              </>
            )}
          </div>

          {/* Bottom Navigation */}
          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, maxWidth: "430px", margin: "0 auto", background: "#1A1A24", display: "flex", padding: "12px 20px", borderTop: "1px solid #2A2A35" }}>
            {[
              { id: "dashboard", label: "Обзор", icon: "📊" },
              { id: "expenses", label: "Расходы", icon: "💳" },
              { id: "settings", label: "Настройки", icon: "⚙️" },
            ].map(tab => (
              <div key={tab.id} onClick={() => setPage(tab.id)} className="tap" style={{ flex: 1, textAlign: "center", opacity: page === tab.id ? 1 : 0.5 }}>
                <div style={{ fontSize: "24px" }}>{tab.icon}</div>
                <div style={{ fontSize: "11px", marginTop: "4px" }}>{tab.label}</div>
              </div>
            ))}
          </div>

          {/* Add Expense Modal */}
          {showModal && (
            <div onClick={() => setShowModal(false)} style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "flex-end", zIndex: 1000 }}>
              <div onClick={e => e.stopPropagation()} style={{ background: "#1A1A24", width: "100%", maxWidth: "430px", margin: "0 auto", borderRadius: "24px 24px 0 0", padding: "24px" }}>
                <h3 style={{ marginBottom: "20px" }}>Новый расход</h3>
                
                <input
                  type="number"
                  placeholder="Сумма"
                  value={formAmount}
                  onChange={e => setFormAmount(e.target.value)}
                  style={{ width: "100%", padding: "14px", marginBottom: "12px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", fontSize: "18px" }}
                />
                
                <select
                  value={formCategory}
                  onChange={e => setFormCategory(e.target.value)}
                  style={{ width: "100%", padding: "14px", marginBottom: "12px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff" }}
                >
                  {CATEGORIES.map(c => (
                    <option key={c.id} value={c.id}>{c.label}</option>
                  ))}
                </select>
                
                <input
                  type="text"
                  placeholder="Описание (необязательно)"
                  value={formNote}
                  onChange={e => setFormNote(e.target.value)}
                  style={{ width: "100%", padding: "14px", marginBottom: "20px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff" }}
                />
                
                <div style={{ display: "flex", gap: "12px" }}>
                  <button onClick={() => setShowModal(false)} style={{ flex: 1, padding: "14px", background: "#2A2A35", border: "none", borderRadius: "12px", color: "#fff", cursor: "pointer" }}>Отмена</button>
                  <button onClick={addExpense} style={{ flex: 2, padding: "14px", background: "linear-gradient(135deg,#FF6B6B,#FF8E53)", border: "none", borderRadius: "12px", color: "#fff", fontWeight: "bold", cursor: "pointer" }}>Добавить</button>
                </div>
              </div>
            </div>
          )}

          {/* Toast */}
          {toast && (
            <div style={{ position: "fixed", bottom: "80px", left: "50%", transform: "translateX(-50%)", background: "#4ECDC4", color: "#fff", padding: "10px 20px", borderRadius: "20px", fontSize: "14px", zIndex: 1001 }}>
              {toast}
            </div>
          )}
        </div>
      );
    }

    // Корневой компонент
    function App() {
      const [userKey, setUserKey] = useState(() => localStorage.getItem("dayspent_session"));
      const [userData, setUserData] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (userKey) {
          const user = getUser(userKey);
          if (user) {
            setUserData(user);
          } else {
            localStorage.removeItem("dayspent_session");
            setUserKey(null);
          }
        }
        setLoading(false);
      }, []);

      if (loading) {
        return <div style={{ display: "flex", justifyContent: "center", alignItems: "center", height: "100vh", background: "#0F0F13", color: "#fff" }}>Загрузка...</div>;
      }

      if (!userKey || !userData) {
        return <AuthScreen onLogin={(key, data) => { setUserKey(key); setUserData(data); }} />;
      }

      return <MainApp userKey={userKey} userData={userData} setUserData={setUserData} onLogout={() => { setUserKey(null); setUserData(null); }} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
